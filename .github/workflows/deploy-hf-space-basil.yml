name: Deploy HF Space - Basil

on:
  push:
    branches: [main]
    paths:
      - spaces/basil/**
      - .github/workflows/deploy-hf-space-basil.yml
      - .github/workflows/deploy-hf-space-reusable.yml
  repository_dispatch:
    types: [pypi-release]
  workflow_dispatch:

concurrency:
  group: deploy-hf-space-basil
  cancel-in-progress: false

jobs:
  deploy:
    uses: ./.github/workflows/deploy-hf-space-reusable.yml
    with:
      source_dir: spaces/basil
      space_id: maximilian-franz/HyperView
    secrets: inherit
