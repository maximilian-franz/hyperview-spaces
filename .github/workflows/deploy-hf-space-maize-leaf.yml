name: Deploy HF Space - Maize Leaf CLIP HyCoCLIP

on:
  push:
    branches: [main]
    paths:
      - spaces/maize-leaf-clip-hycoclip/**
      - .github/workflows/deploy-hf-space-maize-leaf.yml
      - .github/workflows/deploy-hf-space-reusable.yml
  repository_dispatch:
    types: [pypi-release]
  workflow_dispatch:

concurrency:
  group: deploy-hf-space-maize-leaf
  cancel-in-progress: false

jobs:
  deploy:
    uses: ./.github/workflows/deploy-hf-space-reusable.yml
    with:
      source_dir: spaces/maize-leaf-clip-hycoclip
      space_id: maximilian-franz/HyperView
    secrets: inherit
