name: Deploy HF Space - Lettuce NPK CLIP HyCoCLIP

on:
  push:
    branches: [main]
    paths:
      - spaces/lettuce-npk-clip-hycoclip/**
      - .github/workflows/deploy-hf-space-lettuce-npk.yml
      - .github/workflows/deploy-hf-space-reusable.yml
  repository_dispatch:
    types: [pypi-release]
  workflow_dispatch:

concurrency:
  group: deploy-hf-space-lettuce-npk
  cancel-in-progress: false

jobs:
  deploy:
    uses: ./.github/workflows/deploy-hf-space-reusable.yml
    with:
      source_dir: spaces/lettuce-npk-clip-hycoclip
      space_id: maximilian-franz/HyperView-Lettuce
    secrets: inherit
